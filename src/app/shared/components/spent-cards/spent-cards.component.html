<div class="spent-cards">
  @if (cardDetails()) {
    <div class="swiper spent-cards__swiper" #swiperContainer>
      <div class="swiper-wrapper">
        @for (cardDetail of cardDetails(); track cardDetail) {
          <div class="swiper-slide">
            <app-card-detail
              [cardDetail]="cardDetail"
              [homeCurrency]="homeCurrency()"
              [currencySymbol]="currencySymbol()"
            >
            </app-card-detail>
          </div>
        }
        @if (showAddCardSlide) {
          <div class="swiper-slide">
            <div class="spent-cards__add-card" data-testid="add-card">
              <app-add-card [showZeroStateMessage]="false" (addCardClick)="addCardClick.emit()"></app-add-card>
            </div>
          </div>
        }
      </div>
      <div class="swiper-pagination"></div>
    </div>
  }
</div>
